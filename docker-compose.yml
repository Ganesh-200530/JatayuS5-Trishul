services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: autoauth
      POSTGRES_PASSWORD: autoauth
      POSTGRES_DB: autoauth
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoauth"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://autoauth:autoauth@db:5432/autoauth
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-use-a-real-secret}
      APP_ENV: development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
